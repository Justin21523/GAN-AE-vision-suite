# configs/ae_mnist.yaml (示例)
data:
  dataset: "MNIST"
  image_size: 28
  batch_size: 128
  num_workers: 4

model:
  type: "ae" # ae | conv-ae | vae
  img_channels: 1
  latent_dim: 64
  hidden_dims: [32, 64, 128]
  activation: "relu"
  input_size: 28 # 只有 VAE 需要時再加

train:
  epochs: 5
  lr: 1.0e-3
  weight_decay: 0.0
  seed: 42
  amp: true
  log_interval: 100
  save_dir: "logs/checkpoints"

eval:
  metrics: ["psnr", "ssim"] # 可再加 fid, lpips
