# Dataset config: Anime Faces (HF: huggan/anime-faces).
#
# 1) Download:
#   python -m src.scripts.download_anime_faces --out-root ./data/anime_faces
#
# 2) Validate:
#   python -m src.validate_data --config configs/dataset_anime_faces.yaml
#
project: gan-ae-image
seed: 42
device: "cuda:0" # or "cpu"

data:
  dataset: imagefolder
  root: /mnt/data/datasets/gan-ae-vision-suite/data/anime_faces/images
  splits:
    train: /mnt/data/datasets/gan-ae-vision-suite/configs/splits/anime_faces_train.txt
    val: /mnt/data/datasets/gan-ae-vision-suite/configs/splits/anime_faces_val.txt
  batch_size: 64
  num_workers: 4
  pin_memory: true
  persistent_workers: False

  img_size: 128
  center_crop: 128
  normalize_mean: [0.5, 0.5, 0.5]
  normalize_std: [0.5, 0.5, 0.5]

model:
  type: ae
  img_channels: 3
  latent_dim: 128
  hidden_dims: [32, 64, 128]
  activation: relu

training:
  epochs: 1
  lr: 1.0e-3
  weight_decay: 0.0
  seed: 42
  amp: true
  log_interval: 100
  save_dir: "logs/checkpoints"

eval:
  metrics: ["psnr", "ssim"]

logging:
  log_dir: /mnt/data/datasets/gan-ae-vision-suite/logs
  level: INFO

save:
  out_dir: /mnt/data/datasets/gan-ae-vision-suite/outputs/validation/anime_faces
