project: gan-ae-image
seed: 42
device: "cuda:0" # or "cpu"

data:
  dataset: celeba # celeba | mnist
  root: ./data
  download: true
  batch_size: 64
  num_workers: 4
  pin_memory: true # speed up host->GPU copies
  persistent_workers: true
  image_size: 64 # common for GAN/AE with CelebA
  center_crop: 140 # crop to face-ish region then resize
  normalize_mean: [0.5, 0.5, 0.5]
  normalize_std: [0.5, 0.5, 0.5]

logging:
  log_dir: ./logs
  level: INFO

save:
  out_dir: ./outputs/validation
