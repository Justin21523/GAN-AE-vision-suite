project: gan-ae-image
seed: 42
device: cuda:0 # or cpu

data:
  dataset: mnist
  root: ./data
  download: True
  batch_size: 128
  num_workers: 4

  # 統一把 MNIST 28x28 轉為 32x32，避免轉置卷積還原尺寸不一致
  image_size: 32 # MNIST native size
  # Keep MNIST simple: no crop to 24. Normalize to [-1,1] if AE uses Tanh.
  normalize_mean: [0.5]
  normalize_std: [0.5]

  # explicit transforms for MNIST
  train_transforms:
    - name: Resize
      size: 32
    - name: ToTensor
    - name: Normalize
      mean: [0.5]
      std: [0.5]
  val_transforms:
    - name: Resize
      size: 32
    - name: ToTensor
    - name: Normalize
      mean: [0.5]
      std: [0.5]

model:
  type: ae # 可選 ae / conv_ae / vae
  img_channels: 1
  latent_dim: 128
  hidden_dims: [32, 64, 128]
  activation: relu

train:
  epochs: 5
  lr: 1.0e-3
  weight_decay: 0.0
  seed: 42
  amp: true
  log_interval: 100
  save_dir: "logs/checkpoints"
  input_size: 28 # 只有 VAE 需要時再加
eval:
  metrics: ["psnr", "ssim"] # 可再加 fid, lpips

logging:
  log_dir: ./logs
  level: INFO

save:
  out_dir: ./outputs/validation
