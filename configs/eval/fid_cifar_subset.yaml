task_type: "eval"
run_id: "fid_cifar_eval"
seed: 42

eval:
  fidkid:
    enable: true
    ref_dataset:
      name: "cifar10" # Auto-generate if not provided
      split: "test"
    ref_stats_path: null
    num_gen: 5000
    seed: 42
    feature_extractor: "v3"
  image:
    enable: true
    metrics: ["psnr", "ssim", "mse", "mae"]
    max_batches: 10

jobs:
  engine: "inproc"
  queue: "default"
  concurrency: 2

registry:
  enable: true
  alias:
    write_latest: true
    write_best: true

security:
  allowed_roots: ["AI_CACHE_ROOT"]
  deny_outside: true

policy:
  checkpoint:
    keep_last: 5
    keep_best: 1
    min_interval_steps: 1000

logging:
  level: "INFO"