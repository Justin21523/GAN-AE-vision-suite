model:
  type: sngan
  arch: resnet
  img_size: 512
  img_channels: 3
  latent_dim: 256
  base_channels: 32
  spectral_norm: true
  ema:
    enabled: false
data:
  dataset: imagefolder
  root: ./data/anime_hq_cc0_demo/images
  splits:
    train: ./configs/splits/anime_cc0_demo_train.txt
    val: ./configs/splits/anime_cc0_demo_val.txt
  img_size: 512
  train_transforms:
  - name: Resize
    size: 512
  - name: RandomHorizontalFlip
    p: 0.5
  - name: ToTensor
  - name: Normalize
    mean:
    - 0.5
    - 0.5
    - 0.5
    std:
    - 0.5
    - 0.5
    - 0.5
  val_transforms:
  - name: Resize
    size: 512
  - name: ToTensor
  - name: Normalize
    mean:
    - 0.5
    - 0.5
    - 0.5
    std:
    - 0.5
    - 0.5
    - 0.5
  batch_size: 4
  num_workers: 0
  pin_memory: false
  persistent_workers: false
training:
  device: cpu
  epochs: 1
  mixed_precision: false
  lr_g: 0.0002
  lr_d: 0.0002
  betas:
  - 0.0
  - 0.9
  n_critic: 1
  grad_accum_steps: 1
  diffaugment_policy: color,translation,cutout
  diffaugment_p: 1.0
  r1_gamma: 10.0
  r1_every: 16
  tensorboard: false
  log_every: 1
  sample_every: 1
  save_every: 1
  save_every_steps: 1
  keep_last_checkpoints: 2
  logdir: logs/smoke_sngan_resnet_anime512_cc0_demo_cpu
metrics:
  fid_kid:
    enabled: false
