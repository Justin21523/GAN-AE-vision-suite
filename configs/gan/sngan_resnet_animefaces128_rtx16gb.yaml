# GAN training config: SNGAN (hinge) + ResNet + DiffAugment (Anime Faces 128x128, RTX 16GB).
#
# Run in background:
#   bash scripts/run_gan_nohup.sh configs/gan/sngan_resnet_animefaces128_rtx16gb.yaml
#
# Tail logs:
#   tail -f logs/nohup_gan_*/stdout.log
#
model:
  type: "sngan"          # non-"wgan-gp" -> hinge loss path
  arch: "resnet"
  img_size: 128
  img_channels: 3
  latent_dim: 128
  base_channels: 64
  spectral_norm: true
  ema:
    enabled: true
    decay: 0.999

data:
  dataset: "imagefolder"
  root: "/mnt/data/datasets/gan-ae-vision-suite/data/anime_faces/images"
  splits:
    train: /mnt/data/datasets/gan-ae-vision-suite/configs/splits/anime_faces_train.txt
    val: /mnt/data/datasets/gan-ae-vision-suite/configs/splits/anime_faces_val.txt
  img_size: 128
  batch_size: 32
  num_workers: 8
  pin_memory: true
  persistent_workers: true

training:
  device: "cuda"
  epochs: 300

  mixed_precision: true
  amp_dtype: "bf16"
  tf32: true
  cudnn_benchmark: true

  lr_g: 2.0e-4
  lr_d: 2.0e-4
  betas: [0.0, 0.9]

  n_critic: 1
  grad_accum_steps: 2

  diffaugment_policy: "color,translation,cutout"
  diffaugment_p: 1.0

  tensorboard: true
  log_every: 50
  sample_every: 2000
  save_every: 1
  save_every_steps: 5000
  keep_last_checkpoints: 10
  logdir: "logs/sota_sngan_resnet_animefaces_rtx16gb"
  # Recommend overriding with `scripts/run_gan_nohup.sh` to ensure everything stays under /mnt/data/datasets.

metrics:
  fid_kid:
    enabled: false  # enable after installing torchmetrics (optional)
    every_epoch: 5
    max_samples: 5000
