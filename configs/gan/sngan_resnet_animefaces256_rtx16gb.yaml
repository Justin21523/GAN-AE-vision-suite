# GAN training config: SNGAN (hinge) + ResNet + SN + DiffAug + R1 (Anime Faces @ 256x256, RTX 16GB).
#
# Note: source images are low-res (~64x64). This trains on 256x256 upscaled images.
#
# Run in background (writes run dir under /mnt/data/datasets/...):
#   bash scripts/run_gan_nohup.sh configs/gan/sngan_resnet_animefaces256_rtx16gb.yaml
#
model:
  type: "sngan"
  arch: "resnet"
  img_size: 256
  img_channels: 3
  latent_dim: 256
  base_channels: 64
  spectral_norm: true
  ema:
    enabled: true
    decay: 0.999

data:
  dataset: "imagefolder"
  root: "/mnt/data/datasets/gan-ae-vision-suite/data/anime_faces/images"
  splits:
    train: /mnt/data/datasets/gan-ae-vision-suite/configs/splits/anime_faces_train.txt
    val: /mnt/data/datasets/gan-ae-vision-suite/configs/splits/anime_faces_val.txt
  img_size: 256
  train_transforms:
    - {name: Resize, size: 256}
    - {name: RandomHorizontalFlip, p: 0.5}
    - {name: ToTensor}
    - {name: Normalize, mean: [0.5, 0.5, 0.5], std: [0.5, 0.5, 0.5]}
  val_transforms:
    - {name: Resize, size: 256}
    - {name: ToTensor}
    - {name: Normalize, mean: [0.5, 0.5, 0.5], std: [0.5, 0.5, 0.5]}

  # 16GB VRAM safe starting point for 256px.
  batch_size: 16
  num_workers: 8
  pin_memory: true
  persistent_workers: true

training:
  device: "cuda"
  epochs: 400

  mixed_precision: true
  amp_dtype: "bf16"
  tf32: true
  cudnn_benchmark: true

  lr_g: 2.0e-4
  lr_d: 2.0e-4
  betas: [0.0, 0.9]
  n_critic: 1
  grad_accum_steps: 2  # effective batch = 32

  diffaugment_policy: "color,translation,cutout"
  diffaugment_p: 1.0
  r1_gamma: 10.0
  r1_every: 16

  tensorboard: true
  log_every: 50
  sample_every: 2000
  save_every: 1
  save_every_steps: 5000
  keep_last_checkpoints: 10
  logdir: "logs/sota_sngan_resnet_animefaces256_rtx16gb"

metrics:
  fid_kid:
    enabled: false

