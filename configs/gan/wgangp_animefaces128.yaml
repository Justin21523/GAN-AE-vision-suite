# GAN training config: WGAN-GP (Anime Faces 128x128).
#
# 1) Download dataset:
#   python -m src.scripts.download_anime_faces --out-root ./data/anime_faces
#
# 2) Train:
#   python -m src.scripts.train_gan --config configs/gan/wgangp_animefaces128.yaml
#
model:
  type: "wgan-gp"
  img_size: 128
  img_channels: 3
  latent_dim: 128
  g_channels: [1024, 512, 256, 128, 64]
  d_channels: [64, 128, 256, 512, 1024]
  ema:
    enabled: true
    decay: 0.999

data:
  dataset: "imagefolder"
  root: "./data/anime_faces/images"
  splits:
    train: ./configs/splits/anime_faces_train.txt
    val: ./configs/splits/anime_faces_val.txt
  img_size: 128
  batch_size: 64
  num_workers: 8
  pin_memory: true
  persistent_workers: true

training:
  # Multi-day stable run defaults (tune as needed).
  epochs: 200
  device: "cuda"
  lr_g: 1.0e-4
  lr_d: 1.0e-4
  betas: [0.0, 0.9]
  n_critic: 5
  lambda_gp: 10.0
  mixed_precision: true
  amp_dtype: "fp16" # set to "bf16" on Ampere+ if you prefer (no GradScaler)
  tf32: true
  cudnn_benchmark: true
  grad_accum_steps: 1
  log_every: 50
  sample_every: 2000
  save_every: 1
  save_every_steps: 5000
  keep_last_checkpoints: 10
  logdir: "logs/stage3_wgangp_animefaces"

metrics:
  fid_kid:
    enabled: true
    every_epoch: 5
    max_samples: 5000
