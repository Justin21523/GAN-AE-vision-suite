# GAN training config: WGAN-GP (CelebA 128x128).
#
# Used by: `python -m src.scripts.train_gan --config configs/gan/wgangp_celeba128.yaml`
# Key ideas:
# - `n_critic`: how many critic steps per generator step
# - `lambda_gp`: gradient penalty strength
#
model:
  type: "wgan-gp"
  img_size: 128
  img_channels: 3
  latent_dim: 128
  g_channels: [1024, 512, 256, 128, 64]
  d_channels: [64, 128, 256, 512, 1024]
  ema:
    enabled: true
    decay: 0.999

data:
  dataset: "celeba"
  root: "./data"
  download: False
  img_size: 128
  batch_size: 64
  num_workers: 4
  pin_memory: true
  persistent_workers: true

training:
  epochs: 5
  device: "cuda"
  lr_g: 1.0e-4
  lr_d: 1.0e-4
  betas: [0.0, 0.9]
  n_critic: 5
  lambda_gp: 10.0
  mixed_precision: true
  grad_accum_steps: 1
  sample_every: 500
  save_every: 1
  logdir: "logs/stage3_wgangp"

metrics:
  fid_kid:
    enabled: true
    every_epoch: 1
    max_samples: 10000
