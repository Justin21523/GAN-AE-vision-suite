task_type: "gan"
run_id: "gan_mnist_v1"
seed: 42
deterministic: true
output_dir: "./outputs"

data:
  name: "mnist"
  root: "./data"
  type: "torchvision"
  image_size: 28
  batch_size: 128
  num_workers: 4
  aug:
    hflip: false
    random_crop: false

model:
  channels: 1
  latent_dim: 128
  z_dim: 100
  ema_decay: 0.999

loss:
  gan: "hinge"
  lambda_gp: 10.0

optim:
  type: "adam"
  lr_g: 0.0002
  lr_d: 0.0002
  betas: [0.5, 0.999]
  weight_decay: 0.0
  grad_clip: null

train:
  epochs: 100
  batch_size: 128
  grad_accum: 1
  amp: false
  log_every: 100
  sample_every: 500
  ckpt_every: 1000

eval:
  enable: true
  metrics: ["fid", "kid", "psnr", "ssim"]
  ref_dataset:
    root: "./data"
    name: "mnist"
    split: "test"

logging:
  jsonl: true
  wandb:
    project: "gan-ae-vision"
    run_name: "gan_mnist_v1"
    tags: ["gan", "mnist"]

resume:
  resume_ckpt: null
  init_ckpt: null