task_type: "cyclegan"
run_id: "cyclegan_minimal"
seed: 42
deterministic: true
output_dir: "./outputs"

data:
  name: "summer2winter"
  root: "./data/summer2winter"
  type: "unpaired"
  image_size: 128
  batch_size: 1
  num_workers: 2
  channels: 3

model:
  channels: 3
  features: 64
  n_blocks: 6  # Reduced for faster training
  n_layers: 3

img2img:
  paired: false
  direction: "both"
  lambda_cycle: 10.0
  lambda_identity: 0.5

loss:
  gan: "lsgan"  # LSGAN for more stable training
  recon: "l1"
  lambda_cycle: 10.0
  lambda_recon: 10.0
  lambda_identity: 0.5

optim:
  type: "adam"
  lr_g: 0.0002
  lr_d: 0.0002
  betas: [0.5, 0.999]

train:
  epochs: 1
  batch_size: 1
  log_every: 10
  sample_every: 100
  ckpt_every: 500

eval:
  enable: true
  metrics: ["psnr", "ssim", "mse"]
  image:
    max_batches: 2

jobs:
  engine: "inproc"
  queue: "default"
  concurrency: 2

registry:
  enable: true
  alias:
    write_latest: true
    write_best: true

security:
  allowed_roots: ["AI_CACHE_ROOT"]
  deny_outside: true

policy:
  checkpoint:
    keep_last: 3
    keep_best: 1
    min_interval_steps: 500

logging:
  jsonl: true
  wandb:
    project: "cyclegan-minimal"
    run_name: "cyclegan_smoke_test"

resume:
  resume_ckpt: null